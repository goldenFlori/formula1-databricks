resources:
  jobs:
    job_formula1_lakehouse_full_refresh:
      name: job_formula1_lakehouse_full_refresh
      email_notifications:
        no_alert_for_skipped_runs: false
      webhook_notifications: {}
      timeout_seconds: 0
      max_concurrent_runs: 1
      format: MULTI_TASK
      queue:
        enabled: true
      job_clusters:
        - job_cluster_key: Job_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 17.3.x-scala2.13
            node_type_id: Standard_D4s_v3
            azure_attributes:
              first_on_demand: 1
              spot_bid_max_price: -1
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            data_security_mode: DATA_SECURITY_MODE_DEDICATED
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: true
      tasks:
        # Bronze - Ingest
        - task_key: 01_ingest_circuits_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/01.Ingest Circuits File
            source: WORKSPACE
        - task_key: 02_ingest_races_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/02.Ingest Races File
            source: WORKSPACE
        - task_key: 03_ingest_constructors_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/03.Ingest Constructors File
            source: WORKSPACE
        - task_key: 04_ingest_drivers_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/04.Ingest Drivers File
            source: WORKSPACE
        - task_key: 05_ingest_results_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/05.Ingest Results File
            source: WORKSPACE
        - task_key: 06_ingest_sprints_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/02-bronze/06.Ingest Sprints File
            source: WORKSPACE
        # Silver - Transform
        - task_key: 01_transform_circuits_data
          depends_on:
            - task_key: 01_ingest_circuits_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/03-silver/01.Transform Circuits Data
            source: WORKSPACE
        - task_key: 02_transform_races_data
          depends_on:
            - task_key: 02_ingest_races_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/03-silver/02.Transform Races Data
            source: WORKSPACE
        - task_key: 03_transform_constructors_data
          depends_on:
            - task_key: 03_ingest_constructors_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/03-silver/03.Transform Constructors Data
            source: WORKSPACE
        - task_key: 04_transform_drivers_data
          depends_on:
            - task_key: 04_ingest_drivers_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/03-silver/04.Transform Drivers Data
            source: WORKSPACE
        - task_key: 05_transform_results_data
          depends_on:
            - task_key: 05_ingest_results_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/03-silver/05.Transform Results Data
            source: WORKSPACE
        - task_key: 06_transform_sprints_data
          depends_on:
            - task_key: 06_ingest_sprints_file
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/03-silver/06.Transform Sprints Data
            source: WORKSPACE
        # Gold - Build
        - task_key: 01_Build_Races_Dimension
          depends_on:
            - task_key: 01_transform_circuits_data
            - task_key: 02_transform_races_data
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/04-gold/01.Build Races Dimension
            source: WORKSPACE
        - task_key: 02_Build_Constructors_Dimension
          depends_on:
            - task_key: 03_transform_constructors_data
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/04-gold/02.Build Constructors Dimension
            source: WORKSPACE
        - task_key: 03_Build_Drivers_Dimension
          depends_on:
            - task_key: 04_transform_drivers_data
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/04-gold/03.Build Drivers Dimension
            source: WORKSPACE
        - task_key: 04_Build_Results_Fact
          depends_on:
            - task_key: 05_transform_results_data
            - task_key: 06_transform_sprints_data
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/04-gold/04.Build Results Fact
            source: WORKSPACE
        - task_key: 91_Build_Nationality_Region_Reference
          run_if: ALL_SUCCESS
          job_cluster_key: Job_cluster
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          disabled: false
          notebook_task:
            notebook_path: ./formula1-project/04-gold/91.Build Nationality Region Reference
            source: WORKSPACE
